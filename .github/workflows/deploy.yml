name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # allow manual trigger from Actions tab

env:
  AWS_REGION: eu-central-1
  EB_APPLICATION: BiktotHazhav
  EB_ENVIRONMENT: BiktotHazhav-env
  FRONTEND_BUCKET: biktothazhav-frontend
  CLOUDFRONT_DISTRIBUTION_ID: E232ULZSQXPBHP

jobs:
  # ───────────────────────── BACKEND ─────────────────────────
  deploy-backend:
    name: Deploy backend to Elastic Beanstalk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install production dependencies on Linux runner
        working-directory: backend
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci --omit=dev

      - name: Generate Prisma client for Linux
        working-directory: backend
        run: npx prisma generate

      - name: Download Noto fonts for contract PDFs
        working-directory: backend
        run: |
          # contractPdfService.js inlines these TTFs as base64 inside
          # @font-face so chromium on EB doesn't need to fetch a webfont at
          # runtime. NotoSansHebrew covers Hebrew glyphs; NotoSans covers
          # digits, Latin letters and punctuation that NotoSansHebrew lacks.
          mkdir -p fonts
          curl -sSL --fail \
            -o fonts/NotoSansHebrew-Regular.ttf \
            https://raw.githubusercontent.com/googlefonts/noto-fonts/main/hinted/ttf/NotoSansHebrew/NotoSansHebrew-Regular.ttf
          curl -sSL --fail \
            -o fonts/NotoSans-Regular.ttf \
            https://raw.githubusercontent.com/googlefonts/noto-fonts/main/hinted/ttf/NotoSans/NotoSans-Regular.ttf
          ls -lh fonts/

      - name: Build deployment ZIP (includes node_modules)
        working-directory: backend
        run: |
          # Pre-built node_modules ships in the bundle so EB skips the slow
          # npm install on t3.micro. EB still runs npm install but it's a
          # near no-op when packages and lockfile already match.
          zip -rq ../backend-deploy.zip \
            src prisma .ebextensions .npmrc fonts \
            package.json package-lock.json node_modules \
            -x "node_modules/.cache/*"
          ls -lh ../backend-deploy.zip

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APPLICATION }}
          environment_name: ${{ env.EB_ENVIRONMENT }}
          region: ${{ env.AWS_REGION }}
          version_label: "gh-${{ github.run_number }}-${{ github.sha }}"
          deployment_package: backend-deploy.zip
          wait_for_deployment: true
          use_existing_version_if_available: true

  # ───────────────────────── FRONTEND ─────────────────────────
  deploy-frontend:
    name: Build and deploy frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist/ to S3
        working-directory: frontend
        run: |
          # Hashed assets get long cache; everything else (incl. index.html) no-cache.
          aws s3 sync dist/ "s3://${{ env.FRONTEND_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html"
          aws s3 sync dist/ "s3://${{ env.FRONTEND_BUCKET }}/" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/index.html" "/"
